<h2>深海主题的发光色用哪个？</h2>
<p class="subtitle">黑暗背景上最抓眼球的那个颜色 — 按钮、文字发光、动画高亮都用它</p>

<div class="cards">

  <div class="card" data-choice="cyan" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#050a1a; height:160px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;">
      <div style="font-size:2.2rem; font-weight:900; color:#00d4ff; text-shadow: 0 0 30px #00d4ff, 0 0 60px rgba(0,212,255,0.4); letter-spacing:-1px;">DIVE IN</div>
      <div style="display:flex; gap:10px; align-items:center;">
        <div style="width:80px; height:2px; background: linear-gradient(90deg, transparent, #00d4ff); border-radius:2px;"></div>
        <div style="width:8px; height:8px; border-radius:50%; background:#00d4ff; box-shadow: 0 0 15px #00d4ff;"></div>
        <div style="width:80px; height:2px; background: linear-gradient(90deg, #00d4ff, transparent); border-radius:2px;"></div>
      </div>
      <div style="background: rgba(0,212,255,0.12); border:1px solid rgba(0,212,255,0.5); color:#00d4ff; padding:6px 20px; font-size:0.65rem; letter-spacing:4px; border-radius:3px;">JOIN NOW</div>
    </div>
    <div class="card-body">
      <h3 style="color:#00d4ff;">A · 霓虹青 #00D4FF</h3>
      <p>最「水感」的选择。清凉、科技、干净。像荧光浮游生物发光，最接近真实水下感。</p>
    </div>
  </div>

  <div class="card" data-choice="bioluminescent" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#030d0a; height:160px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;">
      <div style="font-size:2.2rem; font-weight:900; color:#00ffaa; text-shadow: 0 0 30px #00ffaa, 0 0 60px rgba(0,255,170,0.4); letter-spacing:-1px;">DIVE IN</div>
      <div style="display:flex; gap:10px; align-items:center;">
        <div style="width:80px; height:2px; background: linear-gradient(90deg, transparent, #00ffaa); border-radius:2px;"></div>
        <div style="width:8px; height:8px; border-radius:50%; background:#00ffaa; box-shadow: 0 0 15px #00ffaa;"></div>
        <div style="width:80px; height:2px; background: linear-gradient(90deg, #00ffaa, transparent); border-radius:2px;"></div>
      </div>
      <div style="background: rgba(0,255,170,0.1); border:1px solid rgba(0,255,170,0.5); color:#00ffaa; padding:6px 20px; font-size:0.65rem; letter-spacing:4px; border-radius:3px;">JOIN NOW</div>
    </div>
    <div class="card-body">
      <h3 style="color:#00ffaa;">B · 生物发光绿 #00FFAA</h3>
      <p>更独特、更神秘。像深海生物的荧光，有一种外星感和高端感。在所有运动网站里很罕见。</p>
    </div>
  </div>

  <div class="card" data-choice="dual" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#05050f; height:160px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;">
      <div style="font-size:2.2rem; font-weight:900; letter-spacing:-1px;">
        <span style="color:#00d4ff; text-shadow: 0 0 30px #00d4ff;">DIVE</span>
        <span style="color:white; opacity:0.6;"> </span>
        <span style="color:#00ffaa; text-shadow: 0 0 30px #00ffaa;">IN</span>
      </div>
      <div style="display:flex; gap:10px; align-items:center;">
        <div style="width:60px; height:2px; background: linear-gradient(90deg, transparent, #00d4ff); border-radius:2px;"></div>
        <div style="width:8px; height:8px; border-radius:50%; background: linear-gradient(135deg, #00d4ff, #00ffaa); box-shadow: 0 0 15px rgba(0,212,255,0.6);"></div>
        <div style="width:60px; height:2px; background: linear-gradient(90deg, #00ffaa, transparent); border-radius:2px;"></div>
      </div>
      <div style="background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,255,170,0.15)); border:1px solid rgba(0,212,255,0.4); padding:6px 20px; font-size:0.65rem; letter-spacing:4px; border-radius:3px; background-clip: padding-box;">
        <span style="background: linear-gradient(90deg, #00d4ff, #00ffaa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:700;">JOIN NOW</span>
      </div>
    </div>
    <div class="card-body">
      <h3><span style="color:#00d4ff;">青</span> + <span style="color:#00ffaa;">绿</span> 双色渐变</h3>
      <p>两种颜色组合成渐变，用在标题、按钮、动画高亮上。层次最丰富，最现代，视觉最复杂。</p>
    </div>
  </div>

</div>

<p class="subtitle" style="margin-top:20px; text-align:center;">选完这个就开始出设计方案了！</p>
